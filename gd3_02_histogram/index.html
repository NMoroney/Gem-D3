<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3 Histogram</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="generateHistogram.js"></script>
    <style>
        body { font-family: sans-serif; }
        .axis path, .axis line {
            fill: none;
            stroke: #000;
            shape-rendering: crispEdges;
        }
    </style>
</head>
<body>
    <h1>Crow Wing Lengths Histogram</h1>
    <div id="histogram-container"></div>

    <script>
        // Call the function to generate the histogram
        // Make sure 'crow_wing_lengths.txt' is accessible from where this HTML is served
        generateD3Histogram('crow_wing_lengths.txt', 600, 400);
    </script>
</body>
</html>
